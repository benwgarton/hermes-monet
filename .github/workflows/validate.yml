name: Validate Monet Hermes skill

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install "pydantic>=2.7,<3" "pytest>=8,<10" "ruff>=0.9,<1"
      - name: Lint skill runtime and tests
        run: ruff check skills tests
      - name: Run publication tests
        run: python -m pytest -q tests
